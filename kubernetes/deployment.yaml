apiVersion: apps/v1
kind: Deployment
metadata:
  name: pcos-api
  labels:
    app: pcos-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pcos-api
  template:
    metadata:
      labels:
        app: pcos-api
    spec:
      containers:
      - name: api
        image: pcos-api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: pcos-api-secrets
            optional: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
